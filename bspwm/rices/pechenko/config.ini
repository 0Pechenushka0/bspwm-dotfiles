[global/wm]

margin-bottom = 0
margin-top = 0

include-file = ../../config/system.ini
include-file = modules.ini

[color]
bg = #D90A0A0A
fg = #40E0D0
bc = #2A9D8F

trans = #00000000
white = #EAEAEA
black = #0A0A0A

red = #CC3333
pink = #5CE6E6
purple = #2A9D8F
blue = #40E0D0
blue-arch = #80ECEC
cyan = #DDDDDD
teal = #2A9D8F
green = #48E0D0
lime = #80ECEC
yellow = #5CE6E6
amber = #40E0D0
orange = #48E0D0
brown = #666666
grey = #A0A0A0
indigo = #888888
blue-gray = #2A2A2A

bg_main = #0A0A0A
bg_polybar = #B3141414
bg_inactive_win = #1E1E1E
bg_borders = #2A2A2A
bg_empty_ws = #333333
grey_dim = #666666
grey_inactive = #A0A0A0
error_red = #CC3333
accent_dark = #1A5A4A
accent_medium = #43ffaf
accent_bright = #5cffbe
accent_active = #7affcc
accent_light = #a0ffdb
text_primary = #EAEAEA
text_secondary = #DDDDDD
border_active = #FFFFFF
#-----------------------------------------------------------

[bar/karla-bar]
monitor = ${env:MONITOR:}
monitor-strict = false
override-redirect = false

bottom = false
fixed-center = true

width = 38%
height = 37

offset-x = 1%
offset-y = 5

background = ${color.bg_polybar}
foreground = ${color.text_primary}

radius = 6.0

line-size = 2
line-color = ${color.bg_borders}

border-size = 2
border-color = ${color.bg_borders}

padding = 2

module-margin-left = 0
module-margin-right = 0

; Text
font-0 = "JetBrainsMono:style=Bold:size=9;2"
; Icons
font-1 = "Material Design Icons Desktop:size=13;3"
font-2 = "Font Awesome 6 Free Solid:size=10;2"

modules-left = launcher
modules-center = cpu sep memory sep filesystem sep usercard sep xkeyboard
modules-right =

separator =
dim-value = 1.0

;;locale = es_MX.UTF-8
wm-restack = bspwm
enable-ipc = true

cursor-click = pointer
cursor-scroll =

[bar/karla-bar2]
monitor = ${env:MONITOR:}
monitor-strict = false
override-redirect = false

bottom = false
fixed-center = true

width = 38%
height = 37

offset-x = 61%
offset-y = 5

background = ${color.bg_polybar}
foreground = ${color.text_primary}

radius = 6.0

line-size = 2
line-color = ${color.accent_medium}

border-size = 2
border-color = ${color.bg_borders}

padding = 2

module-margin-left = 0
module-margin-right = 0

; Text
font-0 = "JetBrainsMono:style=Bold:size=9;2"
; Icons
font-1 = "Font Awesome 6 Free Solid:size=10;2"
font-2 = "Material Design Icons Desktop:size=13;3"
;dpi = 96

;; Available modules
;;	brightness
modules-left = mpd_control sep mplayer
modules-center = battery network sep pulseaudio sep updates sep bluetooth
modules-right = tray sep2 date sep2 power

separator =
dim-value = 1.0

;;locale = es_MX.UTF-8

wm-restack = bspwm
enable-ipc = true

cursor-click = pointer
cursor-scroll =

[bar/karla-bar3]
monitor = ${env:MONITOR:}
monitor-strict = false
override-redirect = false

bottom = false
fixed-center = true

width = 20%
height = 37

offset-x = 40%
offset-y = 5

background = ${color.bg_polybar}
foreground = ${color.text_primary}

radius = 6.0

line-size = 2
line-color = ${color.accent_medium}

border-size = 2
border-color = ${color.bg_borders}

padding = 0

module-margin-left = 0
module-margin-right = 0

; Text
font-0 = "Inconsolata Semi Condensed Extra Bold:size=10;1"
; Icons
font-1 = "Material Design Icons Desktop:size=13;3"
;dpi = 96

modules-left =
modules-center = bspwm
modules-right =

separator =
dim-value = 1.0

;;locale = es_MX.UTF-8

wm-restack = bspwm
enable-ipc = true

cursor-click = pointer
cursor-scroll =


[settings]

screenchange-reload = false

compositing-background = source
compositing-foreground = over
compositing-overline = over
compositing-underline = over
compositing-border = over

pseudo-transparency = false
